name: auto_format_black_isort_pyflakes

on:
  push:            # re-format only what changed on pushes to main
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write  # kept for future PR suggestions

jobs:
  format-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git diff works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort pyflakes

      - name: Determine changed Python files
        id: changed
        run: |
          # For a normal push event GitHub gives us the commit *before* the push.
          # On first push of a new branch or workflow_dispatch that value may be blank/zeros.
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.py' | sort -u | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Nothing to do
        if: ${{ steps.changed.outputs.files == '' }}
        run: echo "No Python files changed – skipping formatting and linting."

      - name: Run Black + isort on changed files
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          black ${{ steps.changed.outputs.files }}
          isort ${{ steps.changed.outputs.files }} --profile black

      - name: Run Pyflakes (fail on warnings)
        id: pyflakes
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          pyflakes ${{ steps.changed.outputs.files }}

      - name: Commit & push (if needed)
        if: ${{ steps.changed.outputs.files != '' && steps.pyflakes.outcome == 'success' }}
        run: |
          if [[ $(git status --porcelain) ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-format changed files 🖤 [skip ci]"
            git push
          else
            echo "Nothing to commit – changed files already tidy."
          fi
