# .github/workflows/static_code_reporter_wrapper.yml
name: static_code_reporter_wrapper

on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  static_checks:
    runs-on: ubuntu-latest
    strategy:
      matrix: { python-version: ['3.12'] }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: ${{ matrix.python-version }} }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install mypy vulture pylint pydocstyle

      # ✅ Tell the script to put logs in ./logs
      - name: Run static analysis suite
        env:
          STATIC_LINT_OUTDIR: logs
        run: python code_tools/static_code_reporter.py

      # Optional: upload the new logs directory
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-logs-${{ matrix.python-version }}
          path: logs
