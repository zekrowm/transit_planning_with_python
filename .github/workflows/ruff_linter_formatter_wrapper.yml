# .github/workflows/ruff_linter_formatter_wrapper.yml
name: ruff_linter_formatter_wrapper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff wrapper
        run: |
          python dev_tools/ruff_lint_formatter.py
