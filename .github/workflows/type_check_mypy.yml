name: type_check_mypy

on:
  push:               # type-check only what changed on pushes to main
    branches: ["main"]
  workflow_dispatch:  # allow manual runs

permissions:
  contents: read      # mypy never writes – read-only is enough

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
      # 0️⃣  Fetch source with full history so we can diff
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣  Set up Python (match project’s runtime)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 2️⃣  Cache mypy’s incremental state for repeat runs
      - name: Restore mypy cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: |
            mypy-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt') }}
          restore-keys: mypy-${{ runner.os }}-

      # 3️⃣  Install mypy and any stub packages you pin
      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          # Pin to the major series you use in local dev
          pip install "mypy>=1.8,<2.0" \
                      types-requests types-PyYAML

      # 4️⃣  Determine which .py files changed in this push
      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || \
             [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.py' \
                          | sort -u | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      # 5️⃣  Short-circuit if nothing relevant changed
      - name: Nothing to type-check
        if: ${{ steps.changed.outputs.files == '' }}
        run: echo "No Python files changed – skipping mypy."

      # 6️⃣  Run mypy only on the changed paths
      - name: Run mypy (incremental, changed files only)
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          # --pretty gives denser CLI output; adjust flags to taste
          # --install-types keeps runs green when new third-party stubs are missing
          mypy --pretty --install-types --non-interactive \
               ${{ steps.changed.outputs.files }}

      # 7️⃣  Persist the updated cache (automatic with actions/cache)
