# .github/workflows/type_check_mypy.yml
name: type_check_mypy

on:
  push:
    branches: [main]            # run on pushes to main
  workflow_dispatch:            # allow manual runs

permissions:
  contents: read                # mypy never writes – read-only is enough

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
      # 0️⃣  Fetch source with full history so we can diff changed files
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1️⃣  Set up Python (match project runtime) and enable built-in pip cache
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 2️⃣  Restore mypy’s incremental cache
      - name: Restore mypy cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: |
            mypy-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: mypy-${{ runner.os }}-

      # 3️⃣  Install project dependencies + mypy and stubs
      #     • All runtime libs live in requirements.txt
      #     • Dev/typing tools are added explicitly here to avoid a setup.py/pyproject.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime requirements
          pip install -r requirements.txt
          # Type-checking toolchain (keep versions in sync with local dev)
          pip install "mypy>=1.8,<2.0" \
                      types-requests types-PyYAML

      # 4️⃣  Auto-install any missing third-party stubs (keeps CI green)
      - name: Auto-install missing stub packages
        run: |
          mypy --install-types --non-interactive -q

      # 5️⃣  Determine which .py files changed in this push
      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || \
             [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.py' \
                          | sort -u | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      # 6️⃣  Short-circuit if nothing relevant changed
      - name: Nothing to type-check
        if: ${{ steps.changed.outputs.files == '' }}
        run: echo "No Python files changed – skipping mypy."

      # 7️⃣  Run mypy only on the changed paths
      - name: Run mypy (incremental, changed files only)
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          mypy --pretty ${{ steps.changed.outputs.files }}

      # 8️⃣  Persist the updated .mypy_cache automatically via actions/cache
