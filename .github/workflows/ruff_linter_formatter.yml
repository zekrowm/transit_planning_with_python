# .github/workflows/ruff_linter_formatter.yml

name: ruff_linter_formatter

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  format-lint:
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.4.0"

      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          BASE_SHA="$(git merge-base "$BASE_SHA" "$GITHUB_SHA")"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.py' | sort -u | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Nothing to do
        if: ${{ steps.changed.outputs.files == '' }}
        run: echo "No Python files changed – skipping formatting and linting."

      - name: Ruff – import ordering & formatting
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          ruff check ${{ steps.changed.outputs.files }} --select I --fix
          ruff format ${{ steps.changed.outputs.files }}

      - name: Ruff – lint (Pyflakes + Google-pydocstyle)
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          ruff check ${{ steps.changed.outputs.files }} --select F,D --fix

      - name: Commit & push (if needed)
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          if [[ $(git status --porcelain) ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-format changed files with ruff [skip ci]"
            git push
          else
            echo "Nothing to commit – changed files already tidy."
          fi
