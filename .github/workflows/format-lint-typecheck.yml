# .github/workflows/format-lint-typecheck.yml
name: format-lint-typecheck

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-lint:
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          # pip 25.1+ is required for `--group` (PEP 735).
          python -m pip install --upgrade pip
          pip install --pre -r requirements.txt
          pip install --pre --group dev --group typing

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Lint with Ruff
        run: ruff check .

      - name: Type check with Ty
        run: ty check scripts --exclude "**/*arcpy*"

      - name: Run tests
        run: pytest
