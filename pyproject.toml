# pyproject.toml
# --------------
# One shared, tool-specific place for static-analysis settings.
# Covers: mypy, pylint, vulture, pydocstyle

# ───────────── mypy (type-checker) ─────────────
[tool.mypy]
python_version         = "3.10"
pretty                 = true
show_error_codes       = true
strict_optional        = true
explicit_package_bases = true
namespace_packages     = true
# (intentionally no global ignore_missing_imports)

# Silence binary-only / stub-less modules (e.g. arcpy) **only**
[[tool.mypy.overrides]]
module                 = ["arcpy.*"]
ignore_missing_imports = true

# ───────────── pylint (linter) ────────────────
[tool.pylint]                       # root table for pylint ≥ 3
jobs = 0                            # use all available CPUs

[tool.pylint.TYPECHECK]
ignored-modules = ["arcpy"]

[tool.pylint."MESSAGES CONTROL"]
disable = ["duplicate-code"]

[tool.pylint.REPORTS]
reports = "no"


# ───────────── vulture (dead-code) ────────────
[tool.vulture]
min_confidence = 70
exclude        = ["arcpy_tools/*"]


# ───────────── pydocstyle (docstrings) ────────
[tool.pydocstyle]
convention = "google"
add-ignore = []                      # fail on every violation
