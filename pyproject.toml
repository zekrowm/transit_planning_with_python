# pyproject.toml
# --------------
# One shared, tool-specific place for static-analysis settings.

[tool.mypy]
python_version        = "3.10"
pretty                = true
show_error_codes      = true
strict_optional       = true
explicit_package_bases = true
namespace_packages    = true
# do *not* ignore missing imports globally

# Silence binary-only / stub-less modules (e.g. arcpy) *and nothing else*
[mypy-arcpy.*]
ignore_missing_imports = true

# ------------------------------------------------------------------
[tool.pylint.main]                     # same section names as .pylintrc
jobs = 0                               # autodetect CPUs for speed

[tool.pylint.TYPECHECK]
ignored-modules = ["arcpy"]

[tool.pylint."MESSAGES CONTROL"]
disable         = ["duplicate-code"]

[tool.pylint.REPORTS]
reports = "no"

# ------------------------------------------------------------------
[tool.vulture]
min_confidence = 70
exclude        = ["arcpy_tools/*"]     # skip helper dir that imports arcpy

# ------------------------------------------------------------------
[tool.pydocstyle]
convention = "google"
add-ignore = []                        # keep empty → fail on every violation
